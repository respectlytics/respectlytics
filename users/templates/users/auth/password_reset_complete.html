{% extends "users/auth_base.html" %}

{% block title %}Password Reset Complete - Respectlytics{% endblock %}

{% block content %}
<div class="text-center">
    <div class="text-6xl mb-4">✅</div>
    <h2 class="text-gray-800 mb-2 text-3xl font-semibold">Password Reset Complete</h2>
    <p class="text-gray-500 mb-6 text-base leading-relaxed">
        Your password has been successfully reset. You can now sign in with your new password.
    </p>
    <a href="{% url 'login' %}" 
       class="inline-block py-3 px-8 btn-gradient text-white no-underline rounded-lg text-lg font-medium">
        Sign In
    </a>
</div>
{% endblock %}
