services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: respectlytics
      POSTGRES_USER: respectlytics
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U respectlytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - DATABASE_URL=postgres://respectlytics:${POSTGRES_PASSWORD:-changeme}@db:5432/respectlytics
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-generate-a-random-string}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - MAXMIND_ACCOUNT_ID=${MAXMIND_ACCOUNT_ID:-}
      - MAXMIND_LICENSE_KEY=${MAXMIND_LICENSE_KEY:-}
      - DATABASE_SSL=${DATABASE_SSL:-False}
      - SECURE_SSL=${SECURE_SSL:-False}
      - ADMIN_REQUIRE_OTP=${ADMIN_REQUIRE_OTP:-False}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
