{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - Respectlytics</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico">

    <!-- Tailwind CSS - Pre-compiled for production -->
    <link rel="stylesheet" href="/static/css/tailwind.css">
</head>
<body class="bg-slate-900 text-slate-50 min-h-screen flex items-center justify-center">
    <div class="max-w-2xl mx-auto px-6 text-center">
        <!-- Error Code -->
        <div class="text-9xl font-black text-rose-500/20 mb-4 select-none">500</div>

        <!-- Icon -->
        <div class="text-6xl mb-6">⚠️</div>

        <!-- Title -->
        <h1 class="text-4xl md:text-5xl font-black text-slate-50 mb-4 tracking-tight">
            Something Went Wrong
        </h1>

        <!-- Description -->
        <p class="text-xl text-slate-400 mb-8 leading-relaxed">
            We're experiencing technical difficulties. Our team has been notified
            and we're working to fix the issue.
        </p>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-purple-600 to-purple-700 text-white text-lg font-bold py-4 px-8 rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-300 no-underline">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                </svg>
                Go Home
            </a>
            <button onclick="location.reload()" class="inline-flex items-center justify-center gap-2 bg-slate-800 text-slate-300 text-lg font-bold py-4 px-8 rounded-xl border-2 border-slate-600 hover:bg-slate-700 hover:-translate-y-0.5 transition-all duration-300 cursor-pointer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                Try Again
            </button>
        </div>
    </div>
</body>
</html>
